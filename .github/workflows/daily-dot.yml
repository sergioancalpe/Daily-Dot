name: Daily Dot

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-dot:
    runs-on: ubuntu-latest
    env:
      LOG_DIR: logs
      CLAUDE_MODEL: claude-haiku-4-5-20251001
      # Disable all tools so Claude just replies with text.
      # Prevents exploring cwd, reading files, or running bash.
      CLAUDE_DISALLOWED_TOOLS: Bash,Edit,Write,Read,Grep,Glob,WebFetch,WebSearch,Task,TodoWrite,NotebookEdit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare log header
        id: prep
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H:%M:%S)
          LOG_FILE="${GITHUB_WORKSPACE}/${LOG_DIR}/${DATE}.txt"
          mkdir -p "${GITHUB_WORKSPACE}/${LOG_DIR}"

          if [ -s "${LOG_FILE}" ]; then
            {
              echo ""
              echo "============================================================"
              echo ""
            } >> "${LOG_FILE}"
          fi

          {
            echo "Date: ${DATE}"
            echo "Time: ${TIME} UTC"
            echo "Model: ${CLAUDE_MODEL}"
            echo "Auth: Claude Pro (OAuth)"
          } >> "${LOG_FILE}"

          echo "log_file=${LOG_FILE}" >> "$GITHUB_OUTPUT"

      - name: Send dot - Account 1
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
          LOG_FILE: ${{ steps.prep.outputs.log_file }}
        run: |
          {
            echo ""
            echo "--- Account 1 ---"
            echo "Message sent: ."
          } >> "${LOG_FILE}"

          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "Skipped: CLAUDE_CODE_OAUTH_TOKEN_1 is not set" | tee -a "${LOG_FILE}"
            exit 0
          fi

          # Run from /tmp (neutral dir) so Claude does not load repo context.
          if response=$(cd /tmp && claude -p "." \
              --model "${CLAUDE_MODEL}" \
              --max-turns 1 \
              --disallowedTools "${CLAUDE_DISALLOWED_TOOLS}" \
              2>&1); then
            echo "Response: ${response}" | tee -a "${LOG_FILE}"
          else
            code=$?
            echo "Error (exit ${code}): ${response}" | tee -a "${LOG_FILE}"
          fi

      - name: Send dot - Account 2
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          LOG_FILE: ${{ steps.prep.outputs.log_file }}
        run: |
          {
            echo ""
            echo "--- Account 2 ---"
            echo "Message sent: ."
          } >> "${LOG_FILE}"

          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "Skipped: CLAUDE_CODE_OAUTH_TOKEN_2 is not set" | tee -a "${LOG_FILE}"
            exit 0
          fi

          if response=$(cd /tmp && claude -p "." \
              --model "${CLAUDE_MODEL}" \
              --max-turns 1 \
              --disallowedTools "${CLAUDE_DISALLOWED_TOOLS}" \
              2>&1); then
            echo "Response: ${response}" | tee -a "${LOG_FILE}"
          else
            code=$?
            echo "Error (exit ${code}): ${response}" | tee -a "${LOG_FILE}"
          fi

      - name: Commit and push log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add daily dot log $(date -u +%Y-%m-%d)"
            git push
          fi
